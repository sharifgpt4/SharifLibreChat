version: "3.8"
services:

  api:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: api-build
    container_name: LibreChat-API
    ports:
      - "3080:3080"
    depends_on:
      - mongodb
    restart: always
    extra_hosts:
    - "host.docker.internal:host-gateway"
    env_file:
      - .env
    volumes:
      - ./images:/app/client/public/images
      - ./librechat.yaml:/app/librechat.yaml
      - ./api/app:/app/api/app # Dev Purpose only.
      - ./api/models:/app/api/models # Dev Purpose only.
      - ./api/server:/app/api/server # Dev Purpose only.

  client:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: prod-stage
    container_name: LibreChat-NGINX
    ports:
      - "8000:80"
    depends_on:
      - api
    restart: always
    volumes:
      - ./client/nginx.conf:/etc/nginx/conf.d/default.conf

  admin:
    build:
      context: .
      dockerfile: ./Dockerfile
      target: admin-build
    container_name: LibreChat-Admin
    ports:
      - "8002:3000"
    depends_on:
      - api
    restart: always
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: "npm run start"
    volumes:
      - ./admin/src:/app/admin/src # Dev Purpose only.
      - ./admin/public:/app/admin/public # Dev Purpose only.

  mongodb:
    container_name: chat-mongodb
    image: mongo
    restart: always
    volumes:
      - /srv/data.vol/data-node:/data/db
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=Googool00
    command: mongod --auth --bind_ip_all
    ports:
      - '127.0.0.1:27018:27017'

  mongo-express:
    image: mongo-express
    restart: always
    ports:
      - 8081:8081
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: root
      ME_CONFIG_MONGODB_ADMINPASSWORD: Googool00
      ME_CONFIG_MONGODB_URL: mongodb://root:Googool00@mongodb:27017/

  meilisearch:
    container_name: chat-meilisearch
    image: getmeili/meilisearch:v1.0
    ports:
       - "7700:7700"
    env_file:
      - .env
    environment:
      - MEILI_HOST=http://meilisearch:7700
      - MEILI_NO_ANALYTICS=true
    volumes:
      - ./meili_data:/meili_data
